<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LustreStudio Server</title><style>body{max-width:900px;margin:2rem auto;font:16px system-ui;padding:0 1rem;background:#10121a;color:#eee}input,button{padding:.65rem;margin:.25rem;border-radius:6px;border:1px solid #555}input{width:min(70%,500px)}button{cursor:pointer}.job{padding:1rem;border-top:1px solid #333}small{color:#aaa}pre{white-space:pre-wrap}</style><h1>LustreStudio Server</h1><form id=f><input name=url placeholder="Primary video page URL" required><input name=quality placeholder="Preferred quality (optional)"><button>Add</button></form><p id=e></p><main id=jobs></main><script>const token=localStorage.token||prompt('API token');localStorage.token=token;const api=(u,o={})=>fetch(u,{...o,headers:{...o.headers,Authorization:'Bearer '+token,'Content-Type':'application/json'}});f.onsubmit=async e=>{e.preventDefault();let x=Object.fromEntries(new FormData(f));let r=await api('/api/jobs',{method:'POST',body:JSON.stringify(x)});if(!r.ok)e.target.nextElementSibling.textContent=(await r.json()).error;else{f.reset();load()}};async function load(){let j=await (await api('/api/jobs')).json();jobs.innerHTML=j.map(x=>`<section class=job><b>${x.state}</b> · ${x.progress}%<br><small>${x.pageUrl}</small><br>${x.outputPath||x.error||''}<br><button onclick="act('${x.id}','pause')">pause</button><button onclick="act('${x.id}','resume')">resume</button><button onclick="act('${x.id}','retry')">retry</button><button onclick="act('${x.id}','cancel')">cancel</button><button onclick="detail('${x.id}')">trace</button><pre id="${x.id}"></pre></section>`).join('')}async function act(id,a){await api('/api/jobs/'+id+'/'+a,{method:'POST'});load()}async function detail(id){let x=await(await api('/api/jobs/'+id)).json();document.getElementById(id).textContent=x.traces.map(t=>t.createdAt+' '+t.stage+': '+t.message).join('\n')}load();setInterval(load,2500)</script>
