<!doctype html>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LustreStudio Server</title>
<style>body{max-width:900px;margin:2rem auto;font:16px system-ui;padding:0 1rem;background:#10121a;color:#eee}input,button{padding:.65rem;margin:.25rem;border-radius:6px;border:1px solid #555;background:#191d29;color:#eee}input{width:min(65%,500px)}button{cursor:pointer}.job{padding:1rem;border-top:1px solid #333}small{color:#aaa}pre{white-space:pre-wrap}.pick{border:1px solid #555;padding:.75rem;border-radius:6px;margin:.5rem 0}dialog{background:#191d29;color:#eee;border:1px solid #666;border-radius:8px;min-width:320px}</style>
<h1>LustreStudio Server</h1><p><a href="/verify/vnc.html?autoconnect=true&resize=remote&path=verify/websockify" target="_blank">Open verification browser</a> — use this only to complete a normal provider verification, then retry the job.</p>
<form id="form"><input name="url" placeholder="Video page or direct-media URL" required><input name="quality" placeholder="Preferred quality (optional)"><div class="pick">Destination: <code id="destination">/</code> <button type="button" id="choose">Choose folder</button></div><button>Add to queue</button></form><p id="error"></p><main id="jobs"></main>
<dialog id="folderDialog"><h3>Choose server folder</h3><p id="folderPath">/</p><button id="up" type="button">Up</button><button id="newFolder" type="button">New folder</button><div id="folders"></div><form method="dialog"><button>Use this folder</button></form></dialog>
<script>
let token=localStorage.token||prompt('API token');localStorage.token=token;let destination='';
const api=async(u,o={})=>{const response=await fetch(u,{...o,headers:{...o.headers,Authorization:'Bearer '+token,'Content-Type':'application/json'}});if(response.status===401){localStorage.removeItem('token');alert('Your API token was rejected. The page will reload and ask for the current token.');location.reload();throw new Error('unauthorized')}return response};
form.onsubmit=async e=>{e.preventDefault();const x=Object.fromEntries(new FormData(form));x.destination=destination;const r=await api('/api/jobs',{method:'POST',body:JSON.stringify(x)});if(!r.ok)error.textContent=(await r.json()).error;else{form.reset();error.textContent='';load()}};
choose.onclick=()=>browse(destination);up.onclick=()=>browse(destination.split('/').slice(0,-1).join('/'));
newFolder.onclick=async()=>{const name=prompt('New folder name');if(!name)return;const r=await api('/api/folders',{method:'POST',body:JSON.stringify({parent:destination,name})}),x=await r.json();if(!r.ok){error.textContent=x.error;return}browse(x.path)};
async function browse(path){const r=await api('/api/folders?path='+encodeURIComponent(path));const x=await r.json();if(!r.ok){error.textContent=x.error;return}destination=x.path;folderPath.textContent='/'+(destination||'');folders.innerHTML=x.folders.map(name=>`<p><button type="button" onclick="browse(${JSON.stringify(destination?destination+'/'+name:name)})">${name}/</button></p>`).join('')||'<small>No child folders</small>';folderDialog.showModal()}
folderDialog.addEventListener('close',()=>{document.getElementById('destination').textContent='/'+(destination||'')});
async function load(){const j=await (await api('/api/jobs')).json();jobs.innerHTML=j.map(x=>`<section class=job><b>${x.state}</b> · ${x.progress}% · <small>/${x.destination||''}</small><br><small>${x.pageUrl}</small><br>${x.outputPath||x.error||''}<br><button onclick="act('${x.id}','pause')">pause</button><button onclick="act('${x.id}','resume')">resume</button><button onclick="act('${x.id}','retry')">retry</button><button onclick="act('${x.id}','cancel')">cancel</button><button onclick="detail('${x.id}')">trace</button><pre id="${x.id}"></pre></section>`).join('')}
async function act(id,a){await api('/api/jobs/'+id+'/'+a,{method:'POST'});load()}async function detail(id){let x=await(await api('/api/jobs/'+id)).json();document.getElementById(id).textContent=x.traces.map(t=>t.createdAt+' '+t.stage+': '+t.message).join('\n')}load();setInterval(load,2500)
</script>
